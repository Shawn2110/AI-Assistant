persona:
  name: Mike
  wake_word: hey mike
  tagline: At your service.
  tone: professional-witty
  greeting: Good {time_of_day}. {name} online. How can I assist you?
  farewell: Until next time. {name} signing off.
  personality: You are {name}, a personal AI assistant. You speak in a professional
    yet witty tone, similar to Jarvis from Iron Man. You are efficient, slightly formal,
    but show personality through dry humor and clever observations. You address the
    user respectfully and always stay focused on getting things done. You keep responses
    concise unless detail is requested. When executing tasks, you confirm actions
    briefly and report results clearly. You never say 'as an AI' or break character.
ai:
  active_provider: groq
  fallback_chain:
  - ollama
  - groq
providers:
  ollama:
    enabled: true
    model: qwen3:8b
    base_url: http://localhost:11434
    max_tokens: 4096
    temperature: 0.7
    tier: free
    description: Local AI (Qwen/Llama/Mistral) -- fully offline, your data stays on
      your machine
  groq:
    enabled: true
    api_key_env: GROQ_API_KEY
    model: llama-3.3-70b-versatile
    max_tokens: 4096
    temperature: 0.7
    tier: free
    description: Fast free cloud AI via Groq (Llama 3)
  gemini:
    enabled: false
    api_key_env: GEMINI_API_KEY
    model: gemini-2.0-flash
    max_tokens: 4096
    temperature: 0.7
    tier: free
    description: Google Gemini 2.0 Flash (free tier)
  claude:
    enabled: true
    api_key_env: ANTHROPIC_API_KEY
    model: claude-sonnet-4-20250514
    max_tokens: 4096
    temperature: 0.7
    tier: paid
    description: Anthropic Claude -- best for coding and reasoning
  openai:
    enabled: false
    api_key_env: OPENAI_API_KEY
    model: gpt-4o-mini
    max_tokens: 4096
    temperature: 0.7
    tier: paid
    description: OpenAI GPT-4o -- versatile, widely used
custom_providers: {}
voice:
  enabled: true
  stt_engine: vosk
  tts_engine: edge_tts
  tts_voice: en-US-GuyNeural
  silence_threshold_ms: 500
  listen_timeout_s: 10
server:
  host: 0.0.0.0
  port: 8765
  cors_origins:
  - '*'
tunnel:
  enabled: false
  provider: ngrok
  ngrok:
    region: us
integrations:
  system:
    enabled: true
  google:
    enabled: false
  microsoft:
    enabled: false
  telegram:
    enabled: false
  discord:
    enabled: false
  whatsapp:
    enabled: false
  instagram:
    enabled: false
  slack:
    enabled: false
  figma:
    enabled: false
  browser:
    enabled: false
voice_automations: {}
