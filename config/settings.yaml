# ============================================================
# AI Assistant - Configuration
# ============================================================
# A personal AI assistant that helps with daily activities.
#
# FEATURES:
#   - Voice Commands: Talk to your assistant like Siri/Bixby
#   - Multiple AI Providers: Choose from Groq, Gemini, Ollama (Qwen),
#     Claude, or OpenAI — switch anytime
#   - App Control: Open/close apps, manage files, adjust system settings
#   - Google Suite: Gmail, Google Calendar, Google Drive
#   - Microsoft 365: Outlook, Teams, OneDrive
#   - Messaging: Telegram, Discord, WhatsApp
#   - Browser Automation: Search, navigate, fill forms
#   - Remote Access: Control your laptop from your phone
#   - Desktop & Mobile App: .NET MAUI app for Windows, Android, iOS
#
# SUPPORTED AI PROVIDERS:
#   - Groq (FREE): Llama 3, Mixtral — fastest free API
#   - Google Gemini (FREE): Gemini 2.0 Flash
#   - Ollama/Qwen (FREE, LOCAL): Run AI on your own machine, fully offline
#   - Claude (PAID): Anthropic's Claude — best for coding and analysis
#   - OpenAI (PAID): GPT-4o — versatile, widely used
#
# SETUP:
#   1. Copy .env.example to .env and add your API keys
#   2. Run `assistant setup` to choose your AI provider
#   3. Run `assistant` to start in CLI mode
#   4. Run `assistant --voice` to start with voice commands
#   5. Run `assistant --server` to start the server for phone access
# ============================================================

A:
  name: "Assistant"
  wake_word: "hey assistant"
  personality: "You are a helpful personal AI assistant. Be concise, friendly, and action-oriented."

# AI Provider - user selects which to use
ai:
  active_provider: null    # Set during setup: groq | gemini | ollama | claude | openai
  # Optional: use different providers for specific tasks
  # overrides:
  #   coding: claude
  #   creative: openai
  fallback_chain:
    - groq
    - gemini
    - ollama

# Available AI providers
providers:
  groq:
    enabled: false
    api_key_env: "GROQ_API_KEY"
    model: "llama-3.3-70b-versatile"
    max_tokens: 4096
    temperature: 0.7
    tier: free
    description: "Fast free AI via Groq (Llama 3, Mixtral)"

  gemini:
    enabled: false
    api_key_env: "GEMINI_API_KEY"
    model: "gemini-2.0-flash"
    max_tokens: 4096
    temperature: 0.7
    tier: free
    description: "Google's free AI model (Gemini 2.0 Flash)"

  ollama:
    enabled: false
    model: "qwen3:8b"
    base_url: "http://localhost:11434"
    max_tokens: 4096
    temperature: 0.7
    tier: free
    description: "Local AI via Ollama — Qwen, Llama, Mistral. Runs offline on your machine."

  claude:
    enabled: false
    api_key_env: "ANTHROPIC_API_KEY"
    model: "claude-sonnet-4-20250514"
    max_tokens: 4096
    temperature: 0.7
    tier: paid
    description: "Anthropic's Claude — excellent for coding, analysis, and reasoning"

  openai:
    enabled: false
    api_key_env: "OPENAI_API_KEY"
    model: "gpt-4o-mini"
    max_tokens: 4096
    temperature: 0.7
    tier: paid
    description: "OpenAI's GPT-4o — versatile, widely used"

# Voice
voice:
  enabled: true
  stt_engine: vosk           # vosk (offline) | groq_whisper (online free)
  tts_engine: edge_tts       # pyttsx3 (offline) | edge_tts (online free)
  tts_voice: "en-US-GuyNeural"
  silence_threshold_ms: 500
  listen_timeout_s: 10

# Server (for phone app connection)
server:
  host: "0.0.0.0"
  port: 8765
  cors_origins:
    - "*"

# Remote access (phone → laptop over internet)
tunnel:
  enabled: false
  provider: ngrok            # ngrok | tailscale
  ngrok:
    region: us

# Integrations
integrations:
  system:
    enabled: true            # App control, file management, system settings
  google:
    enabled: false           # Gmail, Calendar, Drive
  microsoft:
    enabled: false           # Outlook, Teams, OneDrive
  telegram:
    enabled: false
  discord:
    enabled: false
  whatsapp:
    enabled: false
  browser:
    enabled: false           # Browser automation (search, navigate, fill forms)
